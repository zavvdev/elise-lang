[package]
name = "elise-lang"
version = "0.1.0"
edition = "2024"

[[bin]]
# name = name of the compiled executable.
# The output binary will be: target/debug/elise
name = "elise"
path = "src/main.rs"

[lib]
# name = crate name used for extern crate / use.
# It defines how other crates import this library.
# use elise::something;
name = "elise"
path = "src/lib.rs"

[dependencies]
lazy_static = "1.5.0"
regex = "1.12.3"
